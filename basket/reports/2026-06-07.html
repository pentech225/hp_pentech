## 練習
少し早めについたので、14:40ぐらいから体を動かしました。後半ばてたので、15:00から一斉に始めるでよいです。
バスケ体力が切れて他の事をして遊んでいる子どもがいると、全体の雰囲気が閉まらなくなるので、適度に、遊んでくれたらと思います。
強制的に練習をさせたいわけではないので、ここの匙加減、単調な反復でもモチベーションを持ってやってくれるようにするのがコーチの腕の見せ所だと思いました。

## 環境・その他
雨だったので涼しかったです。
最後の片付け、みんな率先してモップやドア閉めを今日もしてくれて助かりました。
ポカリ２Lｘ３本。給水タンク。少し余りました。
シューズが拭ける雑巾を用意　→　ＯＫ

8月の申し込みをしました。2, 9, 23, 30日の日曜日です。16日はお盆で学校が休みです。

## 🎯 次回に向けた課題

- フリースロー対決　一人ずつフリースローを打っていく。最後まで残っていた人が勝ち。
→　みんな近くからでも結構入れるのが難しいから、すぐに脱落してゲームにならなかったです。

- 適切な難易度の課題を、継続的に与え続けることが必要です。
- バスケに対して熱の高い子にたくさん来てもらえるようにうまい導線はないかなと思いました。

# 半年間の取り組み
- 目標は部員**30名**！仲間をどんどん呼ぼう
- スタンプカード導入検討（5回参加でプレゼント）
- 他チームとの交流戦を企画したい
- 目標を明確にする。「シュートが入るようになる」「ドリブルが上手くなる」など、達成感を味わえる目標を設定していきたいです。
- コーチである私がプレイに入ると、全体が見渡せない。やはり、私以外にもプレーをしつつ導いてくれる大人が３人ぐらい必要。募集中
- 尼崎で3on3のオープン戦が、資格などいらず参加しやすい。明確なゴールとしてあり。
