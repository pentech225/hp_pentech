## 全体の感想

初回、合計１０人でバスケットボールができて本当に楽しかったです。

子供たちが打ち解けるようだるまさんが転んだや鬼ごっこから始めました。けが人なく終えられて良かったです。シャトルランがしたい！かくれんぼがしたい！バレーボールがしたいなど、いろんなアイデアが出ました！いい形で取り入れて、みんなで練習メニューを作っていけたらと思っています。

試合は、まずはボールを追いかける！戦術の面はこれから。磨いていくのが楽しみです。全員がもっとシュートを打つ楽しさ、点が決まる喜びを味わえるように工夫していきます。

## 今日実践したこと

### だるまドリブル
鬼が見ていない間にコーンをとる（ドリブルしながら）

### 増え鬼ドリブル
エンドラインからエンドラインまで、ドリブルダッシュ。途中でタッチされたら鬼が増える。最後まで残った人が勝ち。４年生以下は、ボールを持ったまま走るでOK。

### ドリブル
普通のドリブル・クロス。腰を落としてドリブルする練習が必要。レッグスルーやビハインドはおいおいできるようになってほしい。

### レイアップ
少し苦手そう。足に気を取られてのびのびできない。リズムを早めに掴んでもらいたい。左レイアップもしっかり練習していきたい

### 鳥かごパス
ノールックパスやバウンドパスも少しずつできるようにしていきます。総じて楽しく取り組めたので良かったです。中学年以下の子は、中学生以上の人の隣にいることで、連携してパス回しができます。４分試合して、４分休憩がいいですね。５人チームが４つ。２０人ぐらいあつめてやっていきたいです。

### 4on4
ボールを追いかけること。トラベリング、ダブルドリブルなど、基本的なルールを身に着けること。基本はみんなできていました！バックコートにパスしてはいけないことは知らなかったみたいです。ボールのあるところに集まって、戦術的に動くことはまだこれからです。今後が楽しみです。スペースを作って、連携して動いたら本当に楽しいので。

## 環境・その他

とても暑かったので、多めに水分を持ってくるようにしましょう。給水タンク（ポカリなど）の持参を検討します。窓は全開、扇風機もつけようと思います。

最後の片付け、みんな率先してモップやドア閉めをしてくれて本当に助かりました。

---

## 🎯 次回に向けた課題

### シュート練習

- まずお手本を見せ、どこを意識するかを説明する
- 体育館全体を広く使って。一回でも多くシュートを打ってもらう
- 「何ができたらOK」のゴールを明確にする
- 基本ワンアームシュートを全員で練習（女子も）
- ラインの上で実践形式に挑戦
- どれだけ遠くにボールを飛ばせるかのデモをしてもいいかも
- リバウンド役、シュートを打つ人、交代でやっていくのもいいかも。密度の濃い練習をしてもらうためにも。パスを受けてシュートという実践的な練習にもなる。

### 鳥かごパス

- 手を広げて届く範囲でプレー
- ノールックパス・バウンドパス・また抜きを意識
- パスを受けたら3秒以内にパスを出す
- パスが連続10回通ったら終了

---

## 次回までの取り組み
- ポカリなど運営側で用意をしておく
- シューズが拭ける雑巾を用意
- 部員獲得のためのチラシを作成して、学校や地域に配布する
- フリースロー対決　一人ずつフリースローを打っていく。最後まで残っていた人が勝ち。

## 半年間の取り組み

- 目標は部員**30名**！仲間をどんどん呼ぼう
- スタンプカード導入検討（5回参加でプレゼント）
- 他チームとの交流戦を企画したい
- 目標を明確にする。「シュートが入るようになる」「ドリブルが上手くなる」など、達成感を味わえる目標を設定していきたいです。
- コーチである私がプレイに入ると、全体が見渡せない。やはり、私以外にもプレーをしつつ導いてくれる大人が３人ぐらい必要。募集中
- 尼崎で3on3のオープン戦が、資格などいらず参加しやすい。明確なゴールとしてあり。調べる。
- JBL観戦ツアーも企画したい。プロの試合を見て、バスケットボールの魅力を感じてもらいたいです。
