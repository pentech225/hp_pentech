  <link rel="stylesheet" href="style.css">
  <style>
    #reports { background: var(--bg); }
    .report-index-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .report-index-item {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(26,35,126,0.07);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      text-decoration: none;
      color: var(--text);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .report-index-item:hover {
      box-shadow: 0 4px 16px rgba(26,35,126,0.14);
      transform: translateY(-2px);
    }
    .report-index-num {
      background: var(--navy);
      color: var(--white);
      font-size: 0.8rem;
      font-weight: 900;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .report-index-date {
      font-weight: 900;
      color: var(--navy);
      font-size: 1rem;
    }
    .report-index-title {
      font-size: 0.85rem;
      color: #666;
      margin-top: 2px;
    }
    .report-index-arrow {
      margin-left: auto;
      color: var(--orange);
      font-size: 1.1rem;
    }
  </style>
</head>
