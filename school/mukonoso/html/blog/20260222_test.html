        :root {

            --accent: #F5A623;
            --text: #333333;
            --bg: #FAFAFA;
            --white: #FFFFFF;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }
        .container {

            margin: 0 auto;

        header {

            background: var(--white);

            width: 100%;
        }
        .header-top {

            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .header-brand {

            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .header-logo {
            max-height: 50px;
            width: auto;
        }
        .header-brand > a:first-child {
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .header-brand > a:first-child:hover {
            opacity: 0.8;
        }
        .header-school-name {

        .header-phone {

            text-decoration: none;
            white-space: nowrap;
        }
        .header-phone:hover {

            text-decoration: none;

            background-color: #05B04A;

        }

            align-items: center;
            gap: 15px;
            flex-wrap: wrap;

            border-top: 1px solid #eee;

            font-size: 0.95rem;

            transition: all 0.2s;

            color: var(--primary);
            background-color: #f0f8ff;

            line-height: 1.4;

        .article-content {

        .article-content h3 {

        .article-content p {

            margin-bottom: 20px;
            line-height: 1.8;

        .article-content ul,

            margin: 20px 0;
            padding-left: 30px;
        }
        .article-content li {
            margin-bottom: 10px;
            line-height: 1.8;

        .article-content img {

            height: auto;
            border-radius: 10px;

            box-shadow: 0 3px 10px rgba(0,0,0,0.1);

        .article-content blockquote {

        .article-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .nav-link {
            display: inline-block;
            padding: 12px 25px;
            background: var(--white);
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s;
        }
        .nav-link:hover {
            background: var(--primary);
            color: white;
        }
        .back-to-list {
            text-align: center;
            margin-top: 30px;
        }

            text-align: center;
            background: #444;
            color: white;
            font-size: 0.8rem;
            margin-top: 40px;
        }
        footer a {
            color: white;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
