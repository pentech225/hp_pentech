    <section class="blog-article-section">
        <div class="container">
            <div id="article-loading" style="text-align: center; padding: 60px; color: #666;">
                記事を読み込み中...
            </div>
            <div id="article-content" style="display: none;">
                <div class="article-header">
                    <div class="article-meta">
                        <span class="article-date" id="article-date"></span>
                        <span class="article-category" id="article-category"></span>
                    </div>
                    <h1 class="article-title" id="article-title"></h1>
                </div>
                <div class="article-content" id="article-body"></div>
            </div>
            <div id="article-error" style="display: none; text-align: center; padding: 60px; color: #666;">
                <p>記事が見つかりませんでした。</p>
                <a href="index.html" class="nav-link">ブログ一覧に戻る</a>
            </div>

    <div class="article-navigation" id="article-nav" style="display: none;">

    <script>
        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            const loadingEl = document.getElementById('article-loading');
            const contentEl = document.getElementById('article-content');
            const errorEl = document.getElementById('article-error');
            const navEl = document.getElementById('article-nav');

            if (!id) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                return;
            }

            try {
                if (typeof CONFIG === 'undefined' || !CONFIG.GOOGLE_APPS_SCRIPT_URL) {
                    throw new Error('設定がありません');
                }
                const url = CONFIG.GOOGLE_APPS_SCRIPT_URL + '?action=getArticle&id=' + encodeURIComponent(id);
                const response = await fetch(url);
                const data = await response.json();

                if (data.success && data.article) {
                    const article = data.article;
                    document.title = article.title + ' | iTeen 武庫之荘校';
                    document.getElementById('article-date').textContent = article.date;
                    document.getElementById('article-category').textContent = article.category;
                    document.getElementById('article-title').textContent = article.title;
                    document.getElementById('article-body').innerHTML = article.html || article.excerpt || '';
                    
                    loadingEl.style.display = 'none';
                    contentEl.style.display = 'block';
                    navEl.style.display = 'block';
                } else {
                    throw new Error(data.error || '記事を取得できませんでした');
                }
            } catch (err) {
                console.error('記事の読み込みエラー:', err);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
            }
        }

        loadArticle();
    </script>
